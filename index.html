<!DOCTYPE html>
<html>
  <body>
    <form id="commandForm">
      <input type="text" id="commandInput" placeholder="Type your command here" />
      <button type="submit">Submit</button>
    </form>

    <script>
const commands = {
  look: "You are in a small, cozy room with a wooden table.",
  "go north": "You head north and see a forest path.",
  take: "You pick up a shiny key from the floor."
};

document.getElementById('commandForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const command = document.getElementById('commandInput').value.toLowerCase();
  const response = commands[command] || "I don't understand that command.";
  alert(response);
});
    </script>
  </body>
</html>
